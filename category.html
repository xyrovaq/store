<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Category</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <div class="hero-content">
        <img class="avatar" src="AMUL.jpeg" alt="Your Brand" />
        <h1 id="pageTitle">Shop category</h1>
        <p>Browse the best Amazon picks for this category.</p>
      </div>
    </header>

    <section class="product-shell">
      <div class="product-header">
        <div>
          <p class="section-label">Category</p>
          <h2 id="selectedCategoryTitle">Category</h2>
        </div>
        <a href="index.html" class="secondary-button">Back to categories</a>
      </div>

      <section class="product-grid" id="productGrid"></section>
      <p id="noProductsMessage" class="empty-message hidden"></p>
    </section>

    <footer class="footer">
      <p>Use this page as your Instagram bio link.</p>
    </footer>
  </main>

  <script src="category.js"></script>
</body>
</html>
